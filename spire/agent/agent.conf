#
# SPIRE Agent 설정
# ─────────────────
# Agent는 호스트(여기서는 docker 네트워크)에서 동작하며,
# 워크로드(각 마이크로서비스 프로세스)의 요청을 받아 SVID를 발급합니다.
#
agent {
    data_dir = "/run/spire/agent/data"
    log_level = "INFO"
    server_address = "spire-server"
    server_port = "8081"
    socket_path = "/run/spire/agent/public/api.sock"
    trust_domain = "guardians.local"
    # join_token은 CLI(-joinToken)로 전달.
    # insecure_bootstrap = true 이면 Agent 최초 연결 시 Server에서
    # trust bundle 을 직접 가져옵니다 (개발/PoC 용). 운영 환경에서는
    # trust_bundle_path 로 사전 공유된 bundle.crt 를 지정하세요.
    insecure_bootstrap = true
}

plugins {
    # NodeAttestor: Agent → Server 자기 증명
    NodeAttestor "join_token" {
        plugin_data {}
    }

    # KeyManager: Agent가 워크로드용 SVID 키를 저장하는 방식
    KeyManager "memory" {
        plugin_data {}
    }

    # WorkloadAttestor: 워크로드(프로세스)를 식별하는 방법
    #
    # docker attestor 는 Windows/WSL 환경에서 docker.sock 권한 문제로
    # Agent 가 재시작 루프에 빠질 수 있어 일단 비활성화했습니다.
    # 활성화하려면 아래 docker 블록의 주석을 해제하고,
    # docker-compose.yml 의 spire-agent.volumes 에서
    # `/var/run/docker.sock:/var/run/docker.sock:ro` 마운트가 있는지 확인하세요.
    #
    # WorkloadAttestor "docker" {
    #     plugin_data {
    #         docker_socket_path = "unix:///var/run/docker.sock"
    #     }
    # }

    # unix: uid/gid 기반 식별 (현재 사용 중인 attestor)
    WorkloadAttestor "unix" {
        plugin_data {
            discover_workload_path = true
        }
    }
}
