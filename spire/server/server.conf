#
# SPIRE Server 설정
# ─────────────────────
# Trust Domain: guardians.local
# SPIRE Server는 모든 워크로드(각 서비스)의 ID 발급을 담당합니다.
#
server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "guardians.local"
    data_dir = "/run/spire/server/data"
    log_level = "INFO"
    ca_ttl = "24h"
    default_x509_svid_ttl = "1h"
    default_jwt_svid_ttl = "5m"
}

plugins {
    # DataStore: SQLite (PoC). 운영은 PostgreSQL/MySQL 권장.
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/run/spire/server/data/datastore.sqlite3"
        }
    }

    # NodeAttestor: SPIRE Agent가 자신을 증명하는 방법
    # join_token 방식 (가장 간단) - docker-compose 시작 시 수동 발급
    NodeAttestor "join_token" {
        plugin_data {}
    }

    # KeyManager: 서명키 관리 (디스크 기반)
    KeyManager "disk" {
        plugin_data {
            keys_path = "/run/spire/server/data/keys.json"
        }
    }

    # UpstreamAuthority 없음 - self-signed CA 사용
}
