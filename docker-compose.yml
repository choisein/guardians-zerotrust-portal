version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app/backend      # 백엔드 소스 전체 마운트
      - ./frontend:/app/frontend    # 프론트엔드 소스 전체 마운트
    environment:
      - FLASK_DEBUG=1               # 자동 재시작
    restart: unless-stopped
